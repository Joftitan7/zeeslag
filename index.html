<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="game-container">
        <div class="game-section">
            <h2>Player One</h2>
            <div id="player-one-board" class="gameboard"></div>
            <p id="team-one-name">Team 1: Not assigned</p> 
        </div>

        <div class="game-section">
            <h2>Player Two</h2>
            <div id="player-two-board" class="gameboard"></div>
            <p id="team-two-name">Team 2: Not assigned</p>
        </div>
    </div>

    <div class="controls">
        <div class="control-row">
            <button id="start" class="btn btn-primary">Start Game</button>
            <button id="reset" class="btn btn-danger">Reset Game</button>
        </div>

        <div class="control-row">
            <input id="password" type="text" placeholder="Enter Password">
            <button class="btn btn-primary" id="set-password">Set Password</button>
        </div>

        <div class="control-row">
            <input id="team-name" type="text" placeholder="Enter Team Name">
            <button class="btn btn-primary" id="confirm">Confirm Team</button>
        </div>
    </div>

    <script>
        const SetPassword = document.querySelector('#set-password');
        const SetTeamName = document.querySelector('#confirm');

        let hashedPassword = "";  // This will store the hashed password for later use
        let teamOneName = "";     // Variable to store Team 1 name
        let teamTwoName = "";     // Variable to store Team 2 name

        // https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/digest
        async function digestMessage(message) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const hash = await window.crypto.subtle.digest("SHA-256", data);
            return hash;
        }

        // https://stackoverflow.com/questions/40031688/how-can-i-convert-an-arraybuffer-to-a-hexadecimal-string-hex
        function bufferToHex(buffer) {
            const hashArray = Array.from(new Uint8Array(buffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function SettingPassword(hashedPassword) {
            const url = 'https://koene.cvoatweb.be/api/public/zeeslagje/start';

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    password: hashedPassword,
                    test: true
                })
            });

            const text = await response.text();
            if (text) {
                const result = JSON.parse(text);
                console.log('Response from API:', result);
            }
        }

        SetPassword.addEventListener('click', async () => {
            const password = document.querySelector('#password').value;

            const digestBuffer = await digestMessage(password);
            hashedPassword = bufferToHex(digestBuffer);  
            console.log('Hashed password (SHA-256):', hashedPassword);

            await SettingPassword(hashedPassword);  
        });

        function createGameBoard(boardId) {
            const gameBoard = document.querySelector(boardId);
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.classList.add(`${boardId.replace('#', '')}-grid-cell`);
                gameBoard.appendChild(cell);
            }
        }

        createGameBoard('#player-one-board');
        createGameBoard('#player-two-board');

        async function SetTeamNames() {
            const teamNameInput = document.querySelector('#team-name');  
            const teamName = teamNameInput.value; 
                if (hashedPassword !== "") {
                    const url = `https://koene.cvoatweb.be/api/public/zeeslagje/register/${hashedPassword}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: teamName,
                            test: true
                        })
                    });

            

                if (teamOneName === "") {
                    teamOneName = teamName;
                    document.querySelector('#team-one-name').innerText = `Team 1: ${teamOneName}`;
                    
                } else {
                    teamTwoName = teamName;
                    document.querySelector('#team-two-name').innerText = `Team 2: ${teamTwoName}`;
                }
                teamNameInput.value = "";  

            } else {
                alert("Password is not set or is incorrect.");
            }
        }

        SetTeamName.addEventListener('click', async () => {
            await SetTeamNames();  
        });

    </script>

</body>
</html>
